<body style="background:#000;color:#fff;font:20px sans-serif;text-align:center;margin:0">
  <nav style="background:#111;padding:10px;border-bottom:1px solid #fff">
    <a href="." style="color:#fff">HOME</a>
  </nav>
  <style>
    .g {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      padding: 10px
    }

    .b {
      display: flex;
      height: 100px;
      border: 1px solid #fff;
      color: #fff;
      text-decoration: none;
      align-items: center;
      justify-content: center;
      transition: .1s
    }

    .b:hover {
      background: #222;
      transform: scale(1.02)
    }

    .b:active {
      transform: scale(.95)
    }
  </style>
  <div class="g">
    <a href="g1/" class="b">G1</a>
    <a href="g2/" class="b">G2</a>
    <a href="g3/" class="b">G3</a>
  </div>
</body>
